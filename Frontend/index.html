<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forza Horizon Review</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="#">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/55/Forza_logo_2020.svg" 
                     alt="Forza Logo" style="height: 35px; margin-right: 12px;">
                <span>FORZA HORIZON</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#">News</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Community</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Game Info</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">My Forza</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="hero-section">
        <div class="container">
            <h1 class="hero-text">GAME REVIEW</h1>
        </div>
    </section>

    <div class="bg-abu-custom py-5">
        <div class="container">
            <div class="row">
                
                <div class="col-md-4 order-1 order-md-2">
                    <div class="card shadow-sm border-0 card-developer">
                        <div class="card-header bg-dark text-white py-3 text-center">
                            <h5>Tentang Developer</h5>
                        </div>
                        <div class="card-body">
                            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTv9c-7o4r4xcXWVyFZqzIh7czhn0f9GaIZKQ&s" 
                                 alt="Logo Studio" class="img-fluid rounded mb-3 d-block mx-auto">
                            <p class="card-text text-dark" id="dev-info">Memuat info...</p>
                            <hr>
                            <button class="btn btn-primary w-100">Kunjungi Website</button>
                        </div>
                    </div>
                </div>

                <div class="col-md-8 order-2 order-md-1">
                    <article id="article-container"></article>
                </div>
            </div>

            <section class="mt-5 pt-5 border-top border-secondary">
                <h3>Tinggalkan Komentar</h3>
                <div class="card p-3 mb-4 text-dark">
                    <input type="text" id="userName" class="form-control mb-2" placeholder="Nama Anda">
                    <textarea id="commentBox" class="form-control mb-2" placeholder="Tulis pendapatmu..."></textarea>
                    <button onclick="postComment()" class="btn btn-dark">Kirim</button>
                </div>
                <div id="commentList"></div>
            </section>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
